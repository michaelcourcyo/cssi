# Lima VM for developing and testing the CSSI server end-to-end
# against real LVM and a real Linux nfsd. See ./README.md for context.
#
# Usage (from the repo root):
#   make vm-up        # create / start
#   make vm-shell     # ssh in
#   make vm-down      # stop, keep state
#   make vm-destroy   # delete

images:
- location: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-arm64.img"
  arch: "aarch64"
- location: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
  arch: "x86_64"

cpus: 2
memory: "4GiB"
disk: "16GiB"

# An extra 8 GiB virtual disk for the LVM volume group. Lives inside
# Lima's data dir, not on the host filesystem — `make vm-destroy` wipes
# it cleanly.
additionalDisks:
- name: "cssi-pv"
  size: "8GiB"

# Mount only the repo directory read/write, at the same absolute path
# inside the VM. The Makefile's `vm-up` target passes the path in via
# the CSSI_REPO_DIR environment variable (= $(CURDIR), the dir `make`
# was run from). If you invoke `limactl create` directly, export
# CSSI_REPO_DIR yourself or this mount will be empty.
mounts:
- location: "{{ .Env.CSSI_REPO_DIR }}"
  writable: true

# Surface the repo path inside the VM so `cd $CSSI_REPO_DIR` works in
# any guest shell.
env:
  CSSI_REPO_DIR: "{{ .Env.CSSI_REPO_DIR }}"

# The cssi-server listens on :9000 by default; expose it on the host so
# the cssi-driver (running on the Mac) can dial it.
portForwards:
- guestPort: 9000
  hostIP: "127.0.0.1"

provision:
- mode: system
  description: install lvm2 and the kernel NFS server
  script: |
    #!/bin/sh
    set -eu
    export DEBIAN_FRONTEND=noninteractive
    apt-get update
    apt-get install -y lvm2 nfs-kernel-server make

- mode: system
  description: create the cssi volume group on the extra disk
  script: |
    #!/bin/sh
    set -eu
    # Lima attaches the extra disk after the root disk; on cloud-image
    # Ubuntu that's /dev/vdb.
    if ! vgs cssi >/dev/null 2>&1; then
      pvcreate -ff -y /dev/vdb
      vgcreate cssi /dev/vdb
    fi

- mode: system
  description: prepare the export base directory and start nfsd
  script: |
    #!/bin/sh
    set -eu
    # The cssi-server creates one mount + one /etc/exports entry per
    # LV at runtime, so the bootstrap only has to make the base
    # directory exist and ensure nfsd is up and ready to reload.
    mkdir -p /srv/cssi
    systemctl enable --now nfs-kernel-server
